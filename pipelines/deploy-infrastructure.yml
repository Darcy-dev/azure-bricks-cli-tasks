trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**

pool:
  name: 'Default'

variables:
  azureServiceConnection: 'sc-azure-subscription'
  location: 'brazilsouth'
  templateFile: 'infra/main.bicep'

# ════════════════════════════════════════════════
#  DEV
# ════════════════════════════════════════════════
stages:
  - stage: Plan_Dev
    displayName: 'Dev - What-If'
    jobs:
      - job: WhatIf
        displayName: 'Bicep What-If (dev)'
        steps:
          - task: AzureCLI@2
            displayName: 'Run Bicep What-If'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az deployment sub what-if \
                  --location $(location) \
                  --template-file $(templateFile) \
                  --parameters infra/main.dev.bicepparam

  - stage: Deploy_Dev
    displayName: 'Dev - Deploy'
    dependsOn: Plan_Dev
    variables:
      envName: 'dev'
      parametersFile: 'infra/main.dev.bicepparam'
      umiName: 'umi-worker-southbr-dev-0001'
      clusterName: 'cluster-dev-br-ifrisk'
    jobs:
      - deployment: DeployInfra
        displayName: 'Deploy (dev)'
        environment: 'dev-br-ifrisk'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: 'Deploy Bicep to Azure'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az deployment sub create \
                        --location $(location) \
                        --template-file $(templateFile) \
                        --parameters $(parametersFile) \
                        --name "deploy-$(envName)-$(Build.BuildNumber)"

                - task: AzureCLI@2
                  displayName: 'Configure SP Entitlements + Admin'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      OUTPUTS=$(az deployment sub show \
                        --name "deploy-$(envName)-$(Build.BuildNumber)" \
                        --query properties.outputs -o json)
                      WORKSPACE_URL=$(echo $OUTPUTS | jq -r '.databricksWorkspaceUrl.value')
                      CLIENT_ID=$(echo $OUTPUTS | jq -r '.workerIdentityClientId.value')
                      chmod +x infra/scripts/configure-databricks-entitlements.sh
                      ./infra/scripts/configure-databricks-entitlements.sh \
                        "$WORKSPACE_URL" "$CLIENT_ID" "$(umiName)"

                - task: AzureCLI@2
                  displayName: 'Create PAT Token (60 days)'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      OUTPUTS=$(az deployment sub show \
                        --name "deploy-$(envName)-$(Build.BuildNumber)" \
                        --query properties.outputs -o json)
                      WORKSPACE_URL=$(echo $OUTPUTS | jq -r '.databricksWorkspaceUrl.value')
                      chmod +x infra/scripts/create-databricks-pat.sh
                      ./infra/scripts/create-databricks-pat.sh \
                        "$WORKSPACE_URL" "pipeline-token-$(envName)"

                - task: AzureCLI@2
                  displayName: 'Create Databricks Cluster'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      OUTPUTS=$(az deployment sub show \
                        --name "deploy-$(envName)-$(Build.BuildNumber)" \
                        --query properties.outputs -o json)
                      WORKSPACE_URL=$(echo $OUTPUTS | jq -r '.databricksWorkspaceUrl.value')
                      chmod +x infra/scripts/create-databricks-cluster.sh
                      ./infra/scripts/create-databricks-cluster.sh \
                        "$WORKSPACE_URL" "$(clusterName)"

  # ════════════════════════════════════════════════
  #  HML
  # ════════════════════════════════════════════════
  - stage: Plan_Hml
    displayName: 'HML - What-If'
    dependsOn: Deploy_Dev
    jobs:
      - job: WhatIf
        displayName: 'Bicep What-If (hml)'
        steps:
          - task: AzureCLI@2
            displayName: 'Run Bicep What-If'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az deployment sub what-if \
                  --location $(location) \
                  --template-file $(templateFile) \
                  --parameters infra/main.hml.bicepparam

  - stage: Deploy_Hml
    displayName: 'HML - Deploy'
    dependsOn: Plan_Hml
    variables:
      envName: 'hml'
      parametersFile: 'infra/main.hml.bicepparam'
      umiName: 'umi-worker-southbr-hml-0001'
      clusterName: 'cluster-hml-br-ifrisk'
    jobs:
      - deployment: DeployInfra
        displayName: 'Deploy (hml)'
        environment: 'hml-br-ifrisk'
        strategy:
          runOnce:
            deploy:
              steps:
