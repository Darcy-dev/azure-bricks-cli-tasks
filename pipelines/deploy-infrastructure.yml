                      CLIENT_ID=$(echo $OUTPUTS | jq -r '.workerIdentityClientId.value')
                      chmod +x infra/scripts/configure-databricks-entitlements.sh
                      ./infra/scripts/configure-databricks-entitlements.sh \
                        "$WORKSPACE_URL" "$CLIENT_ID" "$(umiName)"

                - task: AzureCLI@2
                  displayName: 'Create PAT Token (60 days)'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      OUTPUTS=$(az deployment sub show \
                        --name "deploy-$(envName)-$(Build.BuildNumber)" \
                        --query properties.outputs -o json)
                      WORKSPACE_URL=$(echo $OUTPUTS | jq -r '.databricksWorkspaceUrl.value')
                      chmod +x infra/scripts/create-databricks-pat.sh
                      ./infra/scripts/create-databricks-pat.sh \
                        "$WORKSPACE_URL" "pipeline-token-$(envName)"

                - task: AzureCLI@2
                  displayName: 'Create Databricks Cluster'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      OUTPUTS=$(az deployment sub show \
                        --name "deploy-$(envName)-$(Build.BuildNumber)" \
